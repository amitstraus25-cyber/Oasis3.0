<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHI Fixer | Oasis Security</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1510;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 3px solid #8B7355;
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ===================== CONFIG =====================
const TILE = 32;
const MAP_W = 32;
const MAP_H = 26;
const VW = MAP_W * TILE;
const VH = MAP_H * TILE;
const PLAYER_SPEED = 3.5;
const FIX_RANGE = 70;
const GAME_TIME = 120;
const TOTAL_ISSUES = 9;

const T = { FLOOR: 0, WALL: 1, DESK: 2, OUTER: 3, POOL: 4, CACTUS: 5, PALM: 6 };
const WALKABLE = new Set([T.FLOOR, T.POOL]);

const OASIS = { teal: '#14B8A6', tealLight: '#5EEAD4', tealDark: '#0D9488' };
const DESERT = {
  sandLight: '#F5E6C8', sandMid: '#E8D5B7', sandDark: '#C4955C', sandDeep: '#A67B45',
  cactus: '#5A7A5A', cactusDark: '#3D5E3D', rock: '#8B7355'
};

const NHI = [
  { id: 'svc-deploy', kind: 'automation', risk: 78 },
  { id: 'svc-auth', kind: 'automation', risk: 92 },
  { id: 'agent-k8s', kind: 'agent', risk: 85 },
  { id: 'agent-scan', kind: 'agent', risk: 76 },
  { id: 'bot-release', kind: 'bot', risk: 79 },
  { id: 'bot-slack', kind: 'bot', risk: 62 },
  { id: 'wkld-api', kind: 'workload', risk: 84 },
  { id: 'sa-terraform', kind: 'svc-acct', risk: 90 },
  { id: 'sa-vault', kind: 'svc-acct', risk: 95 }
];

const ISSUES = [
  { name: 'Credential Leak', sev: 'CRIT' },
  { name: 'Identity Breach', sev: 'CRIT' },
  { name: 'Expired Cert', sev: 'HIGH' },
  { name: 'Stale Token', sev: 'HIGH' },
  { name: 'Permission Conflict', sev: 'HIGH' },
  { name: 'Unrotated Secret', sev: 'CRIT' },
  { name: 'Dormant Identity', sev: 'MED' },
  { name: 'Secret Sprawl', sev: 'HIGH' },
  { name: 'Log Overflow', sev: 'MED' }
];

// ===================== CANVAS =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = VW;
canvas.height = VH;
ctx.imageSmoothingEnabled = false;

// ===================== STATE =====================
let screen = 'title';
let map = [];
let desks = [];
let player = null;
let npcs = [];
let issues = [];
let particles = [];
let sandParticles = [];
let timer = GAME_TIME;
let fixed = 0;
let cooldown = 0;
let keys = {};
let tick = 0;
let lastTime = 0;
let flash = 0;

// ===================== AUDIO =====================
let audio = null;
function initAudio() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(f, d, t = 'square') {
  if (!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = t; o.frequency.value = f; g.gain.value = 0.06;
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + d);
  o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
}
function sfxFix() { tone(523, 0.08); setTimeout(() => tone(784, 0.1), 100); }
function sfxWin() { [0,100,200,300].forEach((t,i) => setTimeout(() => tone(523+i*100, 0.15, 'sine'), t)); }
function sfxLose() { tone(200, 0.4, 'sawtooth'); }

// ===================== INPUT =====================
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (screen === 'title' && (e.code === 'Enter' || e.code === 'Space')) { e.preventDefault(); initAudio(); startGame(); }
  if ((screen === 'win' || screen === 'lose') && (e.code === 'Enter' || e.code === 'Space')) { e.preventDefault(); screen = 'title'; }
  if (screen === 'playing' && e.code === 'Space') { e.preventDefault(); tryFix(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ===================== MAP =====================
function generateMap() {
  map = []; desks = [];
  
  // Fill with floor
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      map[y][x] = (x === 0 || y === 0 || x === MAP_W-1 || y === MAP_H-1) ? T.OUTER : T.FLOOR;
    }
  }

  // OASIS letter patterns (simplified 5x5)
  const L = {
    O: ['01110','10001','10001','10001','01110'],
    A: ['01110','10001','11111','10001','10001'],
    S: ['01111','10000','01110','00001','11110'],
    I: ['11111','00100','00100','00100','11111']
  };

  // Place letters - OA on top, SIS on bottom
  const topY = 4, botY = 14;
  const oX = 6, aX = 14;
  const s1X = 3, iX = 12, s2X = 21;

  placeLetter(L.O, oX, topY);
  placeLetter(L.A, aX, topY);
  placeLetter(L.S, s1X, botY);
  placeLetter(L.I, iX, botY);
  placeLetter(L.S, s2X, botY);

  // Desks around the letters
  const deskPositions = [
    // Around O
    [oX-1, topY+1], [oX+5, topY+1], [oX-1, topY+3], [oX+5, topY+3],
    // Around A  
    [aX-1, topY+2], [aX+5, topY+2],
    // Around S1
    [s1X-1, botY+1], [s1X+5, botY+2],
    // Around I
    [iX+5, botY+2],
    // Around S2
    [s2X-1, botY+1], [s2X+5, botY+3],
  ];

  for (const [dx, dy] of deskPositions) {
    if (dx > 0 && dx < MAP_W-1 && dy > 0 && dy < MAP_H-1 && map[dy][dx] === T.FLOOR) {
      addDesk(dx, dy);
    }
  }

  // Oasis pool in center hallway
  const poolY = 11;
  for (let x = 13; x <= 18; x++) {
    if (map[poolY][x] === T.FLOOR) map[poolY][x] = T.POOL;
  }

  // Cactuses in corners
  [[2,2],[MAP_W-3,2],[2,MAP_H-3],[MAP_W-3,MAP_H-3]].forEach(([x,y]) => {
    if (map[y][x] === T.FLOOR) map[y][x] = T.CACTUS;
  });

  // Palm trees
  [[10,11],[22,11],[5,21],[26,21]].forEach(([x,y]) => {
    if (map[y][x] === T.FLOOR) map[y][x] = T.PALM;
  });
}

function placeLetter(pattern, sx, sy) {
  for (let y = 0; y < 5; y++) {
    for (let x = 0; x < 5; x++) {
      if (pattern[y][x] === '1') {
        const tx = sx + x, ty = sy + y;
        if (tx > 0 && tx < MAP_W-1 && ty > 0 && ty < MAP_H-1) {
          map[ty][tx] = T.WALL;
        }
      }
    }
  }
}

function addDesk(x, y) {
  map[y][x] = T.DESK;
  const prof = NHI[desks.length % NHI.length];
  
  // Find adjacent floor for NPC
  let nx = x, ny = y;
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    if (map[y+dy] && map[y+dy][x+dx] === T.FLOOR) { nx = x+dx; ny = y+dy; break; }
  }
  
  desks.push({ x, y, nx, ny, profile: prof, hasIssue: false });
}

// ===================== ENTITIES =====================
function createPlayer() {
  // Spawn at bottom center - guaranteed clear area
  const sx = Math.floor(MAP_W / 2);
  const sy = MAP_H - 3;
  
  // Find valid floor tile
  let fx = sx, fy = sy;
  outer: for (let r = 0; r < 10; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const cx = sx + dx, cy = sy + dy;
        if (cy > 0 && cy < MAP_H-1 && cx > 0 && cx < MAP_W-1 && map[cy][cx] === T.FLOOR) {
          fx = cx; fy = cy;
          break outer;
        }
      }
    }
  }
  
  player = { x: fx * TILE, y: fy * TILE, dir: 0, frame: 0, timer: 0, moving: false };
}

function createNPCs() {
  npcs = desks.map((d, i) => ({
    x: d.nx * TILE, y: d.ny * TILE, desk: d,
    color: ['#cc4444','#4466cc','#44aa44','#cc8833','#bb44bb','#44aaaa','#7777cc','#cc7777','#77bb77'][i % 9],
    frame: 0, happy: 0
  }));
}

function createIssues() {
  issues = [];
  const shuffled = [...desks].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, Math.min(TOTAL_ISSUES, desks.length));
  
  selected.forEach((d, i) => {
    d.hasIssue = true;
    issues.push({
      type: i, x: d.x * TILE, y: d.y * TILE,
      tx: d.x, ty: d.y, desk: d, fixed: false, anim: 0
    });
  });
}

function startGame() {
  screen = 'playing';
  timer = GAME_TIME; fixed = 0; cooldown = 0; flash = 0; tick = 0;
  particles = []; sandParticles = [];
  generateMap(); createPlayer(); createNPCs(); createIssues();
}

// ===================== UPDATE =====================
function canWalk(px, py) {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return false;
  return WALKABLE.has(map[ty][tx]);
}

function updatePlayer() {
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  
  player.moving = dx !== 0 || dy !== 0;
  
  if (player.moving) {
    if (dy < 0) player.dir = 1;
    if (dy > 0) player.dir = 0;
    if (dx < 0) player.dir = 2;
    if (dx > 0) player.dir = 3;
    
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    
    const spd = PLAYER_SPEED, pad = 5;
    const nx = player.x + dx * spd, ny = player.y + dy * spd;
    
    if (canWalk(nx+pad, player.y+pad) && canWalk(nx+TILE-pad, player.y+pad) &&
        canWalk(nx+pad, player.y+TILE-pad) && canWalk(nx+TILE-pad, player.y+TILE-pad)) player.x = nx;
    if (canWalk(player.x+pad, ny+pad) && canWalk(player.x+TILE-pad, ny+pad) &&
        canWalk(player.x+pad, ny+TILE-pad) && canWalk(player.x+TILE-pad, ny+TILE-pad)) player.y = ny;
    
    player.timer++;
    if (player.timer >= 8) { player.timer = 0; player.frame = 1 - player.frame; }
  } else {
    player.frame = 0; player.timer = 0;
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Sand clock particles
  for (let i = sandParticles.length - 1; i >= 0; i--) {
    const p = sandParticles[i];
    p.y += p.vy; p.life--;
    if (p.life <= 0) sandParticles.splice(i, 1);
  }
  if (tick % 4 === 0 && timer > 0) {
    sandParticles.push({ x: Math.random() * 6 - 3, y: 0, vy: 0.6 + Math.random() * 0.3, life: 25, size: 1.5 });
  }
}

function update(dt) {
  tick++;
  if (screen !== 'playing') return;
  
  timer -= dt;
  if (timer <= 0) { timer = 0; screen = 'lose'; sfxLose(); return; }
  
  if (cooldown > 0) cooldown--;
  if (flash > 0) flash--;
  
  updatePlayer();
  updateParticles();
  
  for (const issue of issues) if (!issue.fixed) issue.anim++;
  for (const npc of npcs) {
    if (npc.happy > 0) npc.happy--;
    if (tick % 15 === 0) npc.frame = 1 - npc.frame;
  }
}

// ===================== FIX =====================
function tryFix() {
  if (cooldown > 0) return;
  
  const px = player.x + TILE/2, py = player.y + TILE/2;
  let best = null, bestDist = FIX_RANGE + 1;
  
  for (const issue of issues) {
    if (issue.fixed) continue;
    const dist = Math.sqrt((issue.x + TILE/2 - px)**2 + (issue.y + TILE/2 - py)**2);
    if (dist < bestDist) { best = issue; bestDist = dist; }
  }
  
  if (!best) return;
  
  best.fixed = true;
  best.desk.hasIssue = false;
  fixed++;
  cooldown = 15;
  flash = 12;
  sfxFix();
  
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: best.x + TILE/2, y: best.y + TILE/2,
      vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5 - 2,
      life: 25 + Math.random() * 20,
      color: [OASIS.teal, OASIS.tealLight, '#99F6E4'][Math.floor(Math.random() * 3)],
      size: 3 + Math.random() * 4
    });
  }
  
  for (const npc of npcs) if (npc.desk === best.desk) npc.happy = 60;
  if (fixed >= TOTAL_ISSUES) { screen = 'win'; sfxWin(); }
}

// ===================== RENDER =====================
function getGradientColor(ty) {
  const t = ty / MAP_H;
  return `rgb(${Math.floor(245 - t * 55)},${Math.floor(230 - t * 75)},${Math.floor(200 - t * 90)})`;
}

function drawTile(tx, ty) {
  const type = map[ty][tx];
  const sx = tx * TILE, sy = ty * TILE;
  const chk = (tx + ty) % 2 === 0;
  const gc = getGradientColor(ty);
  const gc2 = getGradientColor(ty + 0.5);

  if (type === T.FLOOR) {
    ctx.fillStyle = chk ? gc : gc2;
    ctx.fillRect(sx, sy, TILE, TILE);
  }
  else if (type === T.WALL) {
    ctx.fillStyle = '#7a8899';
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#a0acb8';
    ctx.fillRect(sx+1, sy+1, TILE-2, 3);
    ctx.fillStyle = '#5a6878';
    ctx.fillRect(sx+2, sy+TILE-3, TILE-4, 2);
  }
  else if (type === T.DESK) {
    ctx.fillStyle = chk ? gc : gc2;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#7c5420';
    ctx.fillRect(sx+2, sy+2, TILE-4, TILE-8);
    ctx.fillStyle = '#946830';
    ctx.fillRect(sx+2, sy+2, TILE-4, 3);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(sx+5, sy+5, TILE-10, 10);
    const desk = desks.find(d => d.x === tx && d.y === ty);
    ctx.fillStyle = (desk && desk.hasIssue) ? '#441818' : '#0a1e1a';
    ctx.fillRect(sx+6, sy+6, TILE-12, 8);
    if (!desk?.hasIssue) {
      ctx.fillStyle = OASIS.teal;
      ctx.fillRect(sx+7, sy+8, 8, 1);
      ctx.fillRect(sx+7, sy+11, 6, 1);
    }
  }
  else if (type === T.OUTER) {
    ctx.fillStyle = '#363c48';
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#464e5a';
    ctx.fillRect(sx, sy, TILE, 3);
  }
  else if (type === T.POOL) {
    ctx.fillStyle = chk ? gc : gc2;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = OASIS.tealDark;
    ctx.beginPath();
    ctx.ellipse(sx+TILE/2, sy+TILE/2, TILE/2-2, TILE/2-4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = OASIS.teal;
    ctx.beginPath();
    ctx.ellipse(sx+TILE/2, sy+TILE/2, TILE/2-5, TILE/2-7, 0, 0, Math.PI*2);
    ctx.fill();
    // Shimmer
    ctx.fillStyle = 'rgba(94,234,212,0.4)';
    ctx.beginPath();
    ctx.ellipse(sx+TILE/2-4, sy+TILE/2-3, 4, 3, 0, 0, Math.PI*2);
    ctx.fill();
  }
  else if (type === T.CACTUS) {
    ctx.fillStyle = chk ? gc : gc2;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = DESERT.cactus;
    ctx.fillRect(sx+12, sy+4, 8, 24);
    ctx.fillRect(sx+4, sy+10, 8, 4);
    ctx.fillRect(sx+4, sy+6, 4, 8);
    ctx.fillRect(sx+20, sy+14, 8, 4);
    ctx.fillRect(sx+24, sy+10, 4, 8);
    ctx.fillStyle = DESERT.cactusDark;
    ctx.fillRect(sx+14, sy+4, 2, 24);
    // Flower
    if ((tx + ty) % 3 === 0) {
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(sx+16, sy+3, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if (type === T.PALM) {
    ctx.fillStyle = chk ? gc : gc2;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#5D4422';
    ctx.fillRect(sx+14, sy+12, 4, 18);
    ctx.fillStyle = OASIS.tealDark;
    ctx.beginPath();
    ctx.arc(sx+16, sy+6, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = OASIS.teal;
    ctx.beginPath();
    ctx.arc(sx+10, sy+10, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx+22, sy+10, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(sx+14, sy+8, 2, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPerson(wx, wy, opts) {
  const x = wx, y = wy;
  const skin = '#ffcc99', shirt = opts.color || OASIS.teal;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(x+4, y+TILE-4, TILE-8, 3);
  
  // Legs
  ctx.fillStyle = '#3a5070';
  const lo = opts.walking && opts.frame ? 2 : 0;
  ctx.fillRect(x+8, y+20+lo, 6, 8);
  ctx.fillRect(x+18, y+20-lo, 6, 8);
  
  // Body
  ctx.fillStyle = shirt;
  ctx.fillRect(x+6, y+12, 20, 10);
  
  // === 4 ARMS ===
  const ao = opts.frame ? 2 : 0;
  
  // Upper arms
  ctx.fillStyle = shirt;
  ctx.fillRect(x+2-ao, y+12, 6, 4);
  ctx.fillRect(x+24+ao, y+12, 6, 4);
  ctx.fillStyle = skin;
  ctx.fillRect(x+2-ao, y+16, 5, 4);
  ctx.fillRect(x+25+ao, y+16, 5, 4);
  
  // Lower arms
  ctx.fillStyle = shirt;
  ctx.fillRect(x+ao, y+16, 5, 3);
  ctx.fillRect(x+27-ao, y+16, 5, 3);
  ctx.fillStyle = skin;
  ctx.fillRect(x+ao, y+19, 4, 4);
  ctx.fillRect(x+28-ao, y+19, 4, 4);
  
  // Head
  ctx.fillStyle = skin;
  ctx.fillRect(x+10, y+4, 12, 10);
  ctx.fillStyle = opts.hair || '#443322';
  ctx.fillRect(x+10, y+2, 12, 4);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+12, y+8, 2, 2);
  ctx.fillRect(x+18, y+8, 2, 2);
  
  // Player badge
  if (opts.isPlayer) {
    ctx.fillStyle = OASIS.tealLight;
    ctx.fillRect(x+12, y+14, 8, 2);
    ctx.fillRect(x+14, y+16, 4, 3);
  }
  
  // Happy
  if (opts.happy > 30) {
    ctx.fillStyle = '#00ee66';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('✓', x+24, y);
  }
}

function drawIssue(issue) {
  if (issue.fixed) return;
  const x = issue.x, y = issue.y;
  const pulse = Math.sin(issue.anim * 0.1) * 0.3 + 0.7;
  const t = issue.type;
  
  // Background
  ctx.fillStyle = 'rgba(30,20,20,0.92)';
  ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
  
  // Draw detailed icon based on type
  if (t === 0) { // Credential Leak - key dripping
    ctx.fillStyle = '#D4A574';
    ctx.fillRect(x+8, y+10, 12, 5);
    ctx.fillRect(x+18, y+8, 5, 4);
    ctx.fillStyle = '#ff4444';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(x+10+i*4, y+18+i*2+Math.sin(issue.anim*0.15+i)*2, 3, 4);
    }
  } else if (t === 1) { // Breach - fire
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(x+16, y+6); ctx.lineTo(x+26, y+26); ctx.lineTo(x+6, y+26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(x+14, y+14, 4, 8);
  } else if (t === 2) { // Expired cert
    ctx.fillStyle = '#eee';
    ctx.fillRect(x+8, y+5, 16, 22);
    ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+10, y+15); ctx.lineTo(x+22, y+23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+22, y+15); ctx.lineTo(x+10, y+23); ctx.stroke();
    ctx.lineWidth = 1;
  } else if (t === 3) { // Stale token
    ctx.fillStyle = '#aa8844';
    ctx.beginPath(); ctx.arc(x+16, y+16, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#664422';
    ctx.beginPath(); ctx.arc(x+16, y+16, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(80,60,40,0.5)';
    ctx.fillRect(x+8, y+8, 2, 16);
  } else if (t === 4) { // Permission conflict
    ctx.fillStyle = '#4466cc';
    ctx.beginPath(); ctx.moveTo(x+6, y+16); ctx.lineTo(x+16, y+8); ctx.lineTo(x+16, y+24); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cc4444';
    ctx.beginPath(); ctx.moveTo(x+26, y+16); ctx.lineTo(x+16, y+8); ctx.lineTo(x+16, y+24); ctx.closePath(); ctx.fill();
  } else if (t === 5) { // Unrotated secret
    ctx.fillStyle = '#666';
    ctx.fillRect(x+10, y+12, 12, 12);
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(x+16, y+12, 5, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = 'rgba(150,150,150,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+6, y+6); ctx.lineTo(x+14, y+12); ctx.stroke();
  } else if (t === 6) { // Dormant identity
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(x+16, y+12, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(x+11, y+18, 10, 8);
    ctx.fillStyle = '#88aaff';
    const zy = Math.sin(issue.anim * 0.06) * 3;
    ctx.font = 'bold 10px monospace';
    ctx.fillText('z', x+22, y+8+zy);
  } else if (t === 7) { // Secret sprawl
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = '#D4A574';
      const kx = x+6+(i%2)*12+Math.sin(issue.anim*0.05+i)*2;
      const ky = y+6+Math.floor(i/2)*12;
      ctx.fillRect(kx, ky, 7, 3);
      ctx.fillRect(kx-2, ky-2, 4, 7);
    }
  } else { // Log overflow
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(x+5, y+5, 22, 22);
    ctx.fillStyle = '#33cc66';
    ctx.font = '6px monospace';
    const msgs = ['ERR','WARN','CRIT'];
    for (let i = 0; i < 3; i++) {
      ctx.fillText(msgs[(Math.floor(issue.anim/12)+i)%3], x+7, y+12+i*6);
    }
  }
  
  // Ring
  ctx.strokeStyle = `rgba(255,80,80,${pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x+TILE/2, y+TILE/2, TILE/2-2, 0, Math.PI*2);
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawSandClock(x, y, ratio) {
  const w = 28, h = 44;
  
  // Frame
  ctx.fillStyle = DESERT.rock;
  ctx.fillRect(x, y, w, 4);
  ctx.fillRect(x, y+h-4, w, 4);
  ctx.fillRect(x+2, y+4, 2, h-8);
  ctx.fillRect(x+w-4, y+4, 2, h-8);
  
  // Glass
  ctx.fillStyle = 'rgba(200,220,240,0.2)';
  ctx.beginPath();
  ctx.moveTo(x+6, y+6);
  ctx.lineTo(x+w-6, y+6);
  ctx.lineTo(x+w/2+1, y+h/2);
  ctx.lineTo(x+w/2-1, y+h/2);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+w/2-1, y+h/2);
  ctx.lineTo(x+w/2+1, y+h/2);
  ctx.lineTo(x+w-6, y+h-6);
  ctx.lineTo(x+6, y+h-6);
  ctx.closePath();
  ctx.fill();
  
  // Sand
  const topH = Math.floor(14 * ratio);
  const botH = Math.floor(14 * (1 - ratio));
  
  ctx.fillStyle = DESERT.sandDark;
  if (topH > 0) {
    const topY = y+6+(14-topH);
    const topW = 4+(topH/14)*12;
    ctx.beginPath();
    ctx.moveTo(x+w/2-topW/2, topY);
    ctx.lineTo(x+w/2+topW/2, topY);
    ctx.lineTo(x+w/2+1, y+20);
    ctx.lineTo(x+w/2-1, y+20);
    ctx.closePath();
    ctx.fill();
  }
  if (botH > 0) {
    const botW = 4+(botH/14)*12;
    ctx.beginPath();
    ctx.moveTo(x+w/2-1, y+h/2+2);
    ctx.lineTo(x+w/2+1, y+h/2+2);
    ctx.lineTo(x+w/2+botW/2, y+h-6);
    ctx.lineTo(x+w/2-botW/2, y+h-6);
    ctx.closePath();
    ctx.fill();
  }
  
  // Falling sand
  for (const p of sandParticles) {
    ctx.fillStyle = DESERT.sandDark;
    ctx.fillRect(x+w/2+p.x, y+21+p.y*0.7, p.size, p.size);
  }
}

function drawMinimap() {
  const s = 3;
  const mw = MAP_W * s, mh = MAP_H * s;
  const mx = VW - mw - 8, my = VH - mh - 8;
  
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(mx-2, my-2, mw+4, mh+4);
  
  for (let ty = 0; ty < MAP_H; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      const t = map[ty][tx];
      let c = DESERT.sandMid;
      if (t === T.WALL) c = '#7a8899';
      else if (t === T.DESK) c = '#6a5838';
      else if (t === T.OUTER) c = '#363c48';
      else if (t === T.POOL) c = OASIS.teal;
      else if (t === T.CACTUS) c = DESERT.cactus;
      else if (t === T.PALM) c = OASIS.tealDark;
      ctx.fillStyle = c;
      ctx.fillRect(mx+tx*s, my+ty*s, s, s);
    }
  }
  
  // Issues
  for (const i of issues) {
    ctx.fillStyle = i.fixed ? OASIS.teal : '#ff4444';
    ctx.fillRect(mx+i.tx*s-1, my+i.ty*s-1, s+2, s+2);
  }
  
  // Player
  ctx.fillStyle = OASIS.tealLight;
  ctx.fillRect(mx+(player.x/TILE)*s-1, my+(player.y/TILE)*s-1, s+2, s+2);
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(20,16,12,0.92)';
  ctx.fillRect(0, 0, VW, 50);
  ctx.strokeStyle = DESERT.rock;
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, VW, 50);
  ctx.lineWidth = 1;
  
  // Score
  ctx.fillStyle = DESERT.sandLight;
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`Fixed: ${fixed}/${TOTAL_ISSUES}`, 14, 32);
  
  // Title
  ctx.fillStyle = OASIS.tealLight;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NHI FIXER', VW/2, 32);
  ctx.textAlign = 'left';
  
  // Sand clock timer
  const ratio = Math.max(0, timer / GAME_TIME);
  drawSandClock(VW - 95, 4, ratio);
  
  // Timer text
  const m = Math.floor(timer / 60), s = Math.floor(timer % 60);
  ctx.fillStyle = timer < 30 ? '#ff5555' : DESERT.sandLight;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${m}:${s < 10 ? '0' : ''}${s}`, VW - 100, 32);
  ctx.textAlign = 'left';
  
  // Flash
  if (flash > 0) {
    ctx.fillStyle = `rgba(94,234,212,${flash/24})`;
    ctx.fillRect(0, 0, VW, VH);
  }
  
  drawMinimap();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawTitle() {
  const grad = ctx.createLinearGradient(0, 0, 0, VH);
  grad.addColorStop(0, '#2A1F14');
  grad.addColorStop(1, '#0E0A08');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VW, VH);
  
  // Checkerboard
  for (let y = 0; y < VH; y += TILE) {
    for (let x = 0; x < VW; x += TILE) {
      if ((x/TILE + y/TILE) % 2 === 0) {
        ctx.fillStyle = `rgba(60,45,30,${0.2 - (y/VH)*0.15})`;
        ctx.fillRect(x, y, TILE, TILE);
      }
    }
  }
  
  // Cactuses
  for (let i = 0; i < 5; i++) {
    const cx = 80 + i * 180;
    const cy = VH - 60 + Math.sin(Date.now() * 0.001 + i) * 5;
    ctx.fillStyle = DESERT.cactus;
    ctx.fillRect(cx, cy - 35, 8, 40);
    ctx.fillRect(cx - 10, cy - 20, 10, 4);
    ctx.fillRect(cx - 10, cy - 28, 4, 12);
    ctx.fillRect(cx + 8, cy - 14, 10, 4);
    ctx.fillRect(cx + 14, cy - 22, 4, 12);
  }
  
  ctx.textAlign = 'center';
  
  ctx.fillStyle = OASIS.tealLight;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('OASIS SECURITY', VW/2, 70);
  
  ctx.fillStyle = DESERT.sandLight;
  ctx.font = 'bold 44px monospace';
  ctx.fillText('NHI FIXER', VW/2, 125);
  
  ctx.fillStyle = OASIS.teal;
  ctx.font = '14px monospace';
  ctx.fillText('Identity security for the Agentic era', VW/2, 160);
  
  // Character
  drawPerson(VW/2 - 16, 190, { isPlayer: true, color: OASIS.teal, walking: true, frame: Math.floor(Date.now()/300)%2 });
  ctx.fillStyle = OASIS.tealLight;
  ctx.font = '11px monospace';
  ctx.fillText('You (with 4 arms!)', VW/2, 250);
  
  ctx.fillStyle = DESERT.sandMid;
  ctx.font = '13px monospace';
  ctx.fillText('WASD / Arrows - Move', VW/2, 300);
  ctx.fillText('SPACE - Fix nearby issues', VW/2, 325);
  ctx.fillText(`Fix all ${TOTAL_ISSUES} NHI issues before time runs out!`, VW/2, 365);
  
  if (Math.sin(Date.now() * 0.004) > 0) {
    ctx.fillStyle = OASIS.tealLight;
    ctx.font = 'bold 20px monospace';
    ctx.fillText('Press SPACE to start', VW/2, VH - 80);
  }
  
  ctx.textAlign = 'left';
}

function drawEnd(win) {
  const grad = ctx.createLinearGradient(0, 0, 0, VH);
  grad.addColorStop(0, win ? 'rgba(10,50,45,0.96)' : 'rgba(50,20,15,0.96)');
  grad.addColorStop(1, win ? 'rgba(5,30,25,0.96)' : 'rgba(30,10,8,0.96)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VW, VH);
  
  ctx.textAlign = 'center';
  
  if (win) {
    ctx.fillStyle = OASIS.tealLight;
    ctx.font = 'bold 38px monospace';
    ctx.fillText('ALL NHIs SECURED!', VW/2, VH/2 - 40);
    ctx.fillStyle = '#ddf0dd';
    ctx.font = '18px monospace';
    const e = GAME_TIME - timer;
    ctx.fillText(`Time: ${Math.floor(e/60)}:${String(Math.floor(e%60)).padStart(2,'0')}`, VW/2, VH/2 + 20);
  } else {
    ctx.fillStyle = '#ff6655';
    ctx.font = 'bold 42px monospace';
    ctx.fillText("TIME'S UP!", VW/2, VH/2 - 40);
    ctx.fillStyle = '#ffcccc';
    ctx.font = '18px monospace';
    ctx.fillText(`Fixed: ${fixed} / ${TOTAL_ISSUES}`, VW/2, VH/2 + 20);
  }
  
  if (Math.sin(Date.now() * 0.004) > 0) {
    ctx.fillStyle = OASIS.tealLight;
    ctx.font = 'bold 18px monospace';
    ctx.fillText('Press SPACE to continue', VW/2, VH/2 + 100);
  }
  
  ctx.textAlign = 'left';
}

function render() {
  ctx.clearRect(0, 0, VW, VH);
  
  if (screen === 'title') { drawTitle(); return; }
  
  for (let ty = 0; ty < MAP_H; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      drawTile(tx, ty);
    }
  }
  
  for (const i of issues) drawIssue(i);
  for (const n of npcs) drawPerson(n.x, n.y, { color: n.color, frame: n.frame, happy: n.happy });
  
  // Player glow
  ctx.fillStyle = 'rgba(20,184,166,0.2)';
  ctx.beginPath();
  ctx.arc(player.x + TILE/2, player.y + TILE/2, 22, 0, Math.PI * 2);
  ctx.fill();
  
  drawPerson(player.x, player.y, { isPlayer: true, color: OASIS.teal, walking: player.moving, frame: player.frame });
  drawParticles();
  drawHUD();
  
  if (screen === 'win') drawEnd(true);
  if (screen === 'lose') drawEnd(false);
}

// ===================== LOOP =====================
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

lastTime = performance.now();
requestAnimationFrame(loop);
</script>
